<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活达打卡 - UI 设计稿 Demo</title>
    <style>
        :root {
            /* 主题色 - 紫色系 */
            --primary-color: #6B48FF;
            --primary-light: #F0EDFF;
            --primary-gradient: linear-gradient(135deg, #8A64FF 0%, #6B48FF 100%);
            
            /* 背景与卡片 */
            --bg-color: #F4F6F9;
            --card-bg: #FFFFFF;
            
            /* 文字颜色 */
            --text-main: #2C3246;
            --text-sub: #8B94A7;
            --text-light: #C0C6D4;
            
            /* 状态色系 */
            --yellow-color: #F5A623;
            --yellow-bg: #FEF7EA;
            --green-color: #2DCA73;
            --green-bg: #EAF9F1;
            --blue-color: #4A90E2;
            --blue-bg: #EDF4FC;
            
            /* 阴影 */
            --shadow-sm: 0 4px 15px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 10px 30px rgba(107, 72, 255, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #e0e5ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", STHeiti, "Microsoft Yahei", Tahoma, Simsun, sans-serif;
        }

        /* 模拟手机容器 */
        .phone-container {
            width: 375px;
            height: 812px;
            background-color: var(--bg-color);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            border: 12px solid #222;
        }

        /* 灵动岛占位 */
        .dynamic-island {
            width: 120px;
            height: 35px;
            background-color: #000;
            border-radius: 20px;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        /* 顶部欢迎区 */
        .header {
            padding: 70px 24px 20px;
        }

        .greeting {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .sub-greeting {
            font-size: 14px;
            color: var(--text-sub);
        }

        /* 今日进度卡片 */
        .progress-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            margin: 0 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .progress-info h3 {
            margin: 0 0 6px;
            font-size: 17px;
            font-weight: 600;
            color: var(--text-main);
        }

        .progress-info p {
            margin: 0;
            font-size: 13px;
            color: var(--text-light);
        }

        /* 环形进度条模拟 */
        .progress-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: conic-gradient(var(--primary-color) 33%, var(--primary-light) 0);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .progress-circle::after {
            content: "33%";
            position: absolute;
            width: 44px;
            height: 44px;
            background-color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* 列表容器 */
        .habit-list {
            padding: 0 20px;
            height: calc(100% - 300px);
            overflow-y: auto;
            padding-bottom: 120px; /* 为底部导航和FAB留空间 */
        }

        /* 隐藏滚动条 */
        .habit-list::-webkit-scrollbar {
            display: none;
        }

        /* 习惯卡片 */
        .habit-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s;
        }

        .habit-card:active {
            transform: scale(0.98);
        }

        /* 卡片图标 */
        .habit-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 16px;
            font-weight: 600;
            font-size: 18px;
            flex-shrink: 0;
        }

        .icon-yellow { background-color: var(--yellow-bg); color: var(--yellow-color); }
        .icon-green { background-color: var(--green-bg); color: var(--green-color); }
        .icon-blue { background-color: var(--blue-bg); color: var(--blue-color); }
        .icon-purple { background-color: var(--primary-light); color: var(--primary-color); }

        /* 卡片内容 */
        .habit-content {
            flex: 1;
        }

        .habit-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            margin: 0 0 6px;
        }

        .habit-desc {
            font-size: 13px;
            color: var(--text-sub);
            margin: 0 0 12px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 标签组 */
        .habit-tags {
            display: flex;
            gap: 8px;
        }

        .tag {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 500;
        }

        .tag-status {
            background-color: var(--primary-light);
            color: var(--primary-color);
        }

        .tag-count {
            background-color: var(--yellow-bg);
            color: var(--yellow-color);
        }

        /* 悬浮添加按钮 */
        .fab {
            position: absolute;
            bottom: 110px;
            right: 24px;
            width: 56px;
            height: 56px;
            background: var(--primary-gradient);
            border-radius: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 28px;
            font-weight: 300;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            z-index: 10;
        }

        /* 底部导航栏 */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 85px;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 20px;
            box-sizing: border-box;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.02);
            z-index: 5;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-light);
            font-size: 11px;
            font-weight: 500;
            width: 60px;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 6px;
            background-color: currentColor;
            mask-size: cover;
            -webkit-mask-size: cover;
        }
        
        .icon-home {
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>');
        }
        
        .icon-user {
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>');
        }

        /* 底部Home Bar */
        .home-bar {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 5px;
            background-color: #000;
            border-radius: 10px;
            z-index: 20;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="dynamic-island"></div>
    
    <div class="header">
        <div class="greeting">下午好，清风拂</div>
        <div class="sub-greeting">今天也要充满能量 ✨</div>
    </div>

    <div class="progress-card">
        <div class="progress-info">
            <h3>今日进度</h3>
            <p>已完成 1/3 个目标</p>
        </div>
        <div class="progress-circle"></div>
    </div>

    <div class="habit-list">
        <div class="habit-card">
            <div class="habit-icon icon-yellow">月</div>
            <div class="habit-content">
                <div class="habit-title">每年都出去旅行一次</div>
                <div class="habit-desc">世界这么大我想出去看一看</div>
                <div class="habit-tags">
                    <span class="tag tag-status">计划中</span>
                </div>
            </div>
        </div>

        <div class="habit-card">
            <div class="habit-icon icon-green">
                <!-- 这里可以用打钩图标替代文字 -->
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <div class="habit-content">
                <div class="habit-title">每周六学一道新菜</div>
                <div class="habit-desc">每周六每道菜，解锁美食技能</div>
                <div class="habit-tags">
                    <span class="tag tag-status">进行中</span>
                    <span class="tag tag-count">累计1次</span>
                </div>
            </div>
        </div>

        <div class="habit-card">
            <div class="habit-icon icon-blue">天</div>
            <div class="habit-content">
                <div class="habit-title">每天背50个单词</div>
                <div class="habit-desc">100天5000词，词汇量飞跃式增长</div>
                <div class="habit-tags">
                    <span class="tag tag-status">进行中</span>
                    <span class="tag tag-count">累计1次</span>
                </div>
            </div>
        </div>
        
        <div class="habit-card">
            <div class="habit-icon icon-purple">天</div>
            <div class="habit-content">
                <div class="habit-title">每日运动 30 分钟</div>
                <div class="habit-desc">挑战30天养成运动习惯，遇见更好的自己</div>
                <div class="habit-tags">
                    <span class="tag tag-status">进行中</span>
                    <span class="tag tag-count">累计4次</span>
                </div>
            </div>
        </div>
    </div>

    <div class="fab">+</div>

    <div class="bottom-nav">
        <div class="nav-item active">
            <div class="nav-icon icon-home"></div>
            <span>首页</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon icon-user"></div>
            <span>我的</span>
        </div>
    </div>
    
    <div class="home-bar"></div>
</div>

</body>
</html>
